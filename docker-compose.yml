version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - my-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    networks:
      - my-network

  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel
    restart: always
    ports:
      - "8000:8000" 
    volumes:
      - .:/var/www/html 
    networks:
      - my-network
    depends_on:
      - db 

volumes:
  db_data:

networks:
  my-network:
    driver: bridge

